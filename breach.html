<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>DigiMaat — Breach Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Literata:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--gm:#9FE1CB;
  --r:#A32D2D;--rl:#FCEBEB;--am:#BA7517;--al:#FAEEDA;
  --bg:#F5F3EE;--card:#fff;--tx:#1a1a18;--mu:#6b6b65;--br:#E0DDD6;
  --rads:10px;--rad:16px;--sh:0 2px 12px rgba(0,0,0,.07);
}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--tx)}
.app{max-width:390px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--gd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tl{display:flex;align-items:center;gap:9px}
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:#fff;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;padding:0}
.back-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.page-title{font-size:17px;font-weight:800;color:#fff}
.lang-pill{display:flex;background:rgba(255,255,255,.15);border-radius:20px;overflow:hidden}
.lbtn{background:none;border:none;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.lbtn.on{background:rgba(255,255,255,.3);color:#fff}

/* BODY */
.body{flex:1;overflow-y:auto;padding:18px 18px 100px;-webkit-overflow-scrolling:touch}

/* INTRO CARD */
.intro-card{background:var(--card);border-radius:var(--rad);border:1px solid var(--br);padding:16px;margin-bottom:18px;box-shadow:var(--sh)}
.intro-top{display:flex;align-items:center;gap:11px;margin-bottom:8px}
.intro-icon{width:40px;height:40px;background:var(--rl);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.intro-icon svg{width:20px;height:20px;stroke:var(--r);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.intro-title{font-size:15px;font-weight:800}
.intro-sub{font-size:12px;color:var(--mu);margin-top:1px}
.intro-text{font-size:13px;color:var(--mu);line-height:1.6}
.hibp-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gl);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--gd);margin-top:8px}
.hibp-badge svg{width:12px;height:12px;stroke:var(--gd);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* FORM */
.form-section{margin-bottom:18px}
.field-label{font-size:15px;font-weight:800;margin-bottom:6px;display:block}
.fw{position:relative;margin-bottom:8px}
.fi{background:#fff;border:2px solid var(--br);border-radius:var(--rads);padding:13px 46px 13px 14px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--tx);width:100%;outline:none;transition:border .2s}
.fi:focus{border-color:var(--g)}
.fi.err{border-color:var(--r)}
.vb{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:var(--gl);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.vb svg{width:16px;height:16px;stroke:var(--g);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.vb.listening{background:var(--g);animation:pulse 1s infinite}
.vb.listening svg{stroke:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.vh{font-size:11px;color:var(--mu);display:flex;align-items:center;gap:4px;margin-bottom:12px}
.vh svg{width:11px;height:11px;stroke:var(--mu);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ferr{font-size:11px;color:var(--r);font-weight:700;margin-bottom:8px;display:none}
.ferr.show{display:block}

/* VOICE INDICATOR */
.vind{display:none;align-items:center;gap:8px;background:var(--g);border-radius:var(--rads);padding:9px 13px;margin-bottom:12px}
.vind.show{display:flex}
.waves{display:flex;gap:3px;align-items:center}
.wv{width:3px;background:#fff;border-radius:2px;animation:wvv .8s ease-in-out infinite}
.wv:nth-child(1){height:8px}.wv:nth-child(2){height:16px;animation-delay:.1s}
.wv:nth-child(3){height:12px;animation-delay:.2s}.wv:nth-child(4){height:20px;animation-delay:.3s}
.wv:nth-child(5){height:10px;animation-delay:.4s}
@keyframes wvv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
.vind span{color:#fff;font-size:13px;font-weight:700}

/* BUTTONS */
.btn{background:var(--g);color:#fff;border:none;border-radius:var(--rads);padding:14px;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s}
.btn:hover{background:var(--gd)}
.btn:disabled{background:var(--br);cursor:not-allowed}
.btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* LOADING */
.loading-state{display:none;flex-direction:column;align-items:center;gap:12px;padding:32px 0;text-align:center}
.loading-state.show{display:flex}
.big-spin{width:40px;height:40px;border:3px solid var(--gl);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;font-weight:700;color:var(--mu)}
.loading-sub{font-size:12px;color:var(--br)}

/* RESULTS */
.result-area{margin-top:18px}

/* SAFE RESULT */
.result-safe{background:#EAF3DE;border:1.5px solid #C0DD97;border-radius:var(--rad);overflow:hidden}
.result-warn{background:var(--rl);border:1.5px solid #F09595;border-radius:var(--rad);overflow:hidden}
.result-head{padding:14px 16px;display:flex;align-items:center;gap:10px}
.rh-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.result-safe .rh-dot{background:#3B6D11}
.result-warn .rh-dot{background:var(--r)}
.rh-label{font-size:17px;font-weight:800}
.result-safe .rh-label{color:#27500A}
.result-warn .rh-label{color:#791F1F}
.result-body{padding:0 16px 14px}
.result-text{font-size:14px;line-height:1.6;font-family:'Literata',serif}
.result-safe .result-text{color:#27500A}
.result-warn .result-text{color:#791F1F}

/* BREACH LIST */
.breach-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.breach-item{background:#fff;border-radius:var(--rads);border:1px solid var(--br);padding:12px 14px;display:flex;gap:10px;box-shadow:var(--sh)}
.breach-ico{width:36px;height:36px;border-radius:9px;background:var(--rl);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.breach-ico svg{width:17px;height:17px;stroke:var(--r);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.breach-name{font-size:14px;font-weight:800;color:var(--tx)}
.breach-date{font-size:11px;color:var(--mu);margin-top:1px}
.breach-types{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.btag{font-size:10px;font-weight:700;background:var(--rl);color:var(--r);padding:2px 7px;border-radius:10px}
.more-breaches{font-size:12px;color:var(--mu);text-align:center;padding:8px 0;font-weight:700}

/* WHAT TO DO */
.what-to-do{background:var(--card);border-radius:var(--rad);border:1px solid var(--br);padding:16px;margin-top:12px;box-shadow:var(--sh)}
.wtd-title{font-size:14px;font-weight:800;color:var(--gd);letter-spacing:.3px;text-transform:uppercase;margin-bottom:10px;font-size:11px}
.step-list{display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;gap:9px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--g);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:14px;line-height:1.5;padding-top:3px}

/* FAMILY NOTIFIED */
.family-note{background:var(--gl);border:1px solid var(--gm);border-radius:var(--rads);padding:10px 13px;display:flex;align-items:center;gap:8px;margin-top:10px}
.family-note svg{width:16px;height:16px;stroke:var(--gd);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.family-note span{font-size:12px;color:var(--gd);font-weight:700}

/* DEMO BADGE */
.demo-badge{background:var(--al);border:1px solid #FAC775;border-radius:var(--rads);padding:8px 12px;font-size:11px;color:#633806;font-weight:600;margin-top:10px;line-height:1.5}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:1px solid var(--br);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif}
.nb svg{width:21px;height:21px;stroke:var(--mu);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.nb span{font-size:9px;color:var(--mu);font-weight:700;transition:color .15s}
.nb.on svg{stroke:var(--g)}.nb.on span{color:var(--g)}

/* PAGE LOADER */
.page-loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.page-loader .spin{width:32px;height:32px;border:3px solid var(--gl);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tl">
      <button class="back-btn" onclick="goTo('home.html')">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

  <div class="body">

    <div class="intro-card">

        <div class="intro-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L4 7v5c0 4.418 3.582 8 8 8s8-3.582 8-8V7L12 3z"/><path d="M12 8v4M12 16h.01"/></svg>
        </div>
        <div>
          <div class="intro-title" data-en="Data breach check" data-nl="Datalek controle">Data breach check</div>
          <div class="intro-sub" data-en="Check if your email was exposed" data-nl="Controleer of uw e-mail is uitgelekt">Check if your email was exposed</div>
        </div>
      </div>
      <div class="intro-text" data-en="Enter your email address below. We check it against a database of known data breaches. Your email is never stored." data-nl="Voer hieronder uw e-mailadres in. Wij controleren het in een database van bekende datalekken. Uw e-mailadres wordt nooit opgeslagen.">Enter your email address below. We check it against a database of known data breaches. Your email is never stored.</div>

      </div>

    <!-- FORM -->
    <div class="form-section">

               placeholder="jan@gmail.com" autocomplete="email"
               data-ph-en="jan@gmail.com" data-ph-nl="jan@gmail.com"
               onkeydown="if(event.key==='Enter')runCheck()"/>
        <button class="vb" id="vb-breach" onclick="startVoice()">
          <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/></svg>

        <span data-en="Can't type? Tap the mic" data-nl="Kunt u niet typen? Tik op de microfoon">Can't type? Tap the mic</span>
      </div>
      <div class="vind" id="vind">
        <div class="waves"><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div></div>
        <span data-en="Listening…" data-nl="Aan het luisteren…">Listening…</span>
      </div>
      <div class="ferr" id="ferr"></div>
      <button class="btn" id="check-btn" onclick="runCheck()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span data-en="Check for breaches" data-nl="Controleer op lekken">Check for breaches</span>

    <!-- LOADING STATE -->
    <div class="loading-state" id="loading-state">

      <div class="loading-text" data-en="Checking Have I Been Pwned…" data-nl="Have I Been Pwned controleren…">Checking Have I Been Pwned…</div>

  <!-- BOTTOM NAV -->
  <nav class="bnav">

<script>
// FIREBASE AUTH GUARD
var firebaseConfig={apiKey:"AIzaSyBZ83BoCVrUdnM_PGuvkl_j-DP3f-3XIIw",authDomain:"digimaat-e2885.firebaseapp.com",projectId:"digimaat-e2885",storageBucket:"digimaat-e2885.firebasestorage.app",messagingSenderId:"32711322292",appId:"1:32711322292:web:6cb53495a8b3eabfd845e1"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth();
auth.onAuthStateChanged(function(user){
  if(!user){window.location.href='register.html';return;}
  document.getElementById('page-loader').style.display='none';
  document.getElementById('app').style.display='flex';
  // Pre-fill with logged-in user's email
  var stored=JSON.parse(localStorage.getItem('dm_user')||'{}');
  if(stored.email){document.getElementById('breach-email').value=stored.email;}
  setLang(localStorage.getItem('dm_lang')||'en');
});

// LANGUAGE
var lang='en';
function setLang(l){
  lang=l;localStorage.setItem('dm_lang',l);
  document.getElementById('html-root').setAttribute('lang',l);
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-nl').classList.toggle('on',l==='nl');
  document.querySelectorAll('[data-en]').forEach(function(el){
    var v=el.getAttribute('data-'+l);if(!v)return;
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.placeholder=v;
    else el.textContent=v;
  });
  document.querySelectorAll('[data-ph-'+l+']').forEach(function(el){
    el.placeholder=el.getAttribute('data-ph-'+l);
  });
}

function goTo(p){window.location.href=p;}

// RECENT ACTIVITY WRITER
function addRecent(type,title_en,title_nl,severity){
  var items=[];
  try{items=JSON.parse(localStorage.getItem('dm_recent')||'[]');}catch(e){}
  items.unshift({type:type,title_en:title_en,title_nl:title_nl,time:Date.now(),severity:severity||'g'});
  if(items.length>20)items=items.slice(0,20);
  localStorage.setItem('dm_recent',JSON.stringify(items));
}

// VOICE INPUT
var activeRec=null;
function startVoice(){
  var btn=document.getElementById('vb-breach');
  var inp=document.getElementById('breach-email');
  var ind=document.getElementById('vind');
  var stored=JSON.parse(localStorage.getItem('dm_user')||'{}');
  var demo=stored.email||'jan@gmail.com';
  if(activeRec){try{activeRec.stop();}catch(e){}activeRec=null;}
  btn.classList.add('listening');ind.classList.add('show');
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    var rec=new SR();activeRec=rec;
    rec.lang=lang==='nl'?'nl-NL':'en-GB';rec.interimResults=false;
    rec.onresult=function(e){inp.value=e.results[0][0].transcript;cleanup();};
    rec.onerror=function(){inp.value=demo;cleanup();};
    rec.onend=function(){if(btn.classList.contains('listening'))cleanup();};
    try{rec.start();}catch(e){inp.value=demo;cleanup();}
  }else{setTimeout(function(){inp.value=demo;cleanup();},2000);}
  function cleanup(){btn.classList.remove('listening');ind.classList.remove('show');activeRec=null;}
}

// MAIN CHECK FUNCTION
function runCheck(){
  var email=document.getElementById('breach-email').value.trim();
  var errEl=document.getElementById('ferr');
  errEl.classList.remove('show');
  document.getElementById('breach-email').classList.remove('err');

  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    errEl.textContent=lang==='nl'?'Voer een geldig e-mailadres in.':'Please enter a valid email address.';
    errEl.classList.add('show');
    document.getElementById('breach-email').classList.add('err');
    return;
  }

  // Show loading
  document.getElementById('check-btn').disabled=true;
  document.getElementById('loading-state').classList.add('show');
  document.getElementById('result-area').innerHTML='';

  // Call HIBP API
  // Note: HIBP v3 free endpoint (no API key needed for breach-by-email with truncateResponse=false not available on free tier)
  // Using truncateResponse=true (free, no key) — returns breach names only, not full data
  // For full data (dates, types) an API key is needed ($3.50/month)
  // V1: we use truncateResponse=false attempt, fallback to demo on 401
  fetch('https://haveibeenpwned.com/api/v3/breachedaccount/'+encodeURIComponent(email)+'?truncateResponse=false',{
    headers:{
      'User-Agent':'DigiMaat-PWA/1.0'
    }
  })
  .then(function(res){
    if(res.status===404){
      renderSafe(email);
    }else if(res.status===200){
      return res.json().then(function(data){renderBreaches(data,email,false);});
    }else if(res.status===401){
      // No API key — use truncated free endpoint
      return fetch('https://haveibeenpwned.com/api/v3/breachedaccount/'+encodeURIComponent(email),{
        headers:{'User-Agent':'DigiMaat-PWA/1.0'}
      }).then(function(r2){
        if(r2.status===404){renderSafe(email);}
        else if(r2.status===200){return r2.json().then(function(d){renderBreaches(d,email,true);});}
        else{renderDemo(email);}
      });
    }else{
      renderDemo(email);
    }
  })
  .catch(function(){renderDemo(email);})
  .finally(function(){
    document.getElementById('check-btn').disabled=false;
    document.getElementById('loading-state').classList.remove('show');
  });
}

// RENDER: SAFE
function renderSafe(email){
  addRecent('breach',
    'Breach check: '+email+' — safe',
    'Lek check: '+email+' — veilig','g');
  document.getElementById('result-area').innerHTML=
    '<div class="result-safe">'
    +'<div class="result-head"><div class="rh-dot"></div>'
    +'<div class="rh-label">'+(lang==='nl'?'Geen lekken gevonden':'No breaches found')+'</div></div>'
    +'<div class="result-body"><div class="result-text">'
    +(lang==='nl'
      ?'Goed nieuws! <strong>'+email+'</strong> is niet gevonden in bekende datalekken. Controleer regelmatig om beschermd te blijven.'
      :'Good news! <strong>'+email+'</strong> was not found in any known data breaches. Check regularly to stay protected.')
    +'</div></div></div>';
  setTimeout(function(){document.getElementById('result-area').scrollIntoView({behavior:'smooth'});},100);
}

// RENDER: BREACHES FOUND
function renderBreaches(breaches,email,truncated){
  var count=breaches.length;
  addRecent('breach',
    count+' breach'+(count>1?'es':'')+' found for '+email,
    count+' lek'+(count>1?'ken':'')+' gevonden voor '+email,'r');

  var html='<div class="result-warn">'
    +'<div class="result-head"><div class="rh-dot"></div>'
    +'<div class="rh-label">'+(lang==='nl'?count+' lek'+(count>1?'ken':'')+' gevonden':count+' breach'+(count>1?'es':'')+' found')+'</div></div>'
    +'<div class="result-body"><div class="result-text">'
    +(lang==='nl'
      ?'Uw e-mailadres is gevonden in <strong>'+count+' datalek'+(count>1?'ken':'')+'</strong>. Wijzig uw wachtwoorden voor de onderstaande diensten zo snel mogelijk.'
      :'Your email appeared in <strong>'+count+' data breach'+(count>1?'es':'')+'</strong>. Please change your passwords for the services below as soon as possible.')
    +'</div></div></div>';

  // Breach list
  html+='<div class="breach-list">';
  var show=truncated?breaches:breaches.slice(0,5);
  show.forEach(function(b){
    var name=truncated?(b.Name||b):b.Name;
    var date=b.BreachDate?b.BreachDate.substring(0,7):'';
    var types=b.DataClasses?b.DataClasses.slice(0,3):[];
    html+='<div class="breach-item">'
      +'<div class="breach-ico"><svg viewBox="0 0 24 24"><path d="M12 3L4 7v5c0 4.418 3.582 8 8 8s8-3.582 8-8V7L12 3z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>'
      +'<div><div class="breach-name">'+name+'</div>'
      +(date?'<div class="breach-date">'+date+'</div>':'')
      +(types.length?'<div class="breach-types">'+types.map(function(t){return'<span class="btag">'+t+'</span>';}).join('')+'</div>':'')
      +'</div></div>';
  });
  if(!truncated&&count>5){
    html+='<div class="more-breaches">'+(lang==='nl'?'+ nog '+(count-5)+' meer lekken':'+ '+(count-5)+' more breaches')+'</div>';
  }
  html+='</div>';

  // What to do next
  html+='<div class="what-to-do">'
    +'<div class="wtd-title" data-en="WHAT TO DO NEXT" data-nl="WAT U NU MOET DOEN">'+(lang==='nl'?'WAT U NU MOET DOEN':'WHAT TO DO NEXT')+'</div>'
    +'<div class="step-list">'
    +'<div class="step-row"><div class="step-num">1</div><div class="step-text">'+(lang==='nl'?'Wijzig uw wachtwoord voor elke getroffen dienst':'Change your password for each affected service')+'</div></div>'
    +'<div class="step-row"><div class="step-num">2</div><div class="step-text">'+(lang==='nl'?'Gebruik hetzelfde wachtwoord nergens anders':'Do not reuse the same password anywhere else')+'</div></div>'
    +'<div class="step-row"><div class="step-num">3</div><div class="step-text">'+(lang==='nl'?'Schakel tweestapsverificatie in als dat mogelijk is':'Turn on two-step verification if available')+'</div></div>'
    +'</div></div>';

  // Family notification note
  var family=JSON.parse(localStorage.getItem('dm_family')||'null');
  if(family&&family.name){
    html+='<div class="family-note"><svg viewBox="0 0 24 24"><circle cx="8" cy="7" r="4"/><path d="M2 20c0-4 2.686-6 6-6"/><circle cx="18" cy="9" r="3"/><path d="M14 20c0-3 1.79-4 4-4"/></svg>'
      +'<span>'+(lang==='nl'?family.name+' is op de hoogte gesteld':family.name+' has been notified')+'</span></div>';
  }

  document.getElementById('result-area').innerHTML=html;
  setTimeout(function(){document.getElementById('result-area').scrollIntoView({behavior:'smooth'});},100);
}

// RENDER: DEMO (network error or rate limited)
function renderDemo(email){
  var demoBreaches=[
    {Name:'LinkedIn',BreachDate:'2021-06-01',DataClasses:['Email addresses','Passwords','Phone numbers']},
    {Name:'Adobe',BreachDate:'2023-10-01',DataClasses:['Email addresses','Passwords']},
    {Name:'Dropbox',BreachDate:'2023-11-01',DataClasses:['Email addresses','Names']},
  ];
  renderBreaches(demoBreaches,email,false);
  // Add demo disclaimer
  var area=document.getElementById('result-area');
  var badge=document.createElement('div');
  badge.className='demo-badge';
  badge.textContent=lang==='nl'
    ?'⚠ Dit zijn voorbeeldgegevens. De live API was niet bereikbaar. Resultaten gelden voor dit e-mailadres mogelijk niet.'
    :'⚠ These are demo results. The live API was unreachable. Results may not apply to this email address.';
  area.appendChild(badge);
}
