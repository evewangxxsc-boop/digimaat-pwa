<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="/manifest.json"/>
<title>DigiMaat — Alerts</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Literata:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--gm:#9FE1CB;
  --am:#BA7517;--al:#FAEEDA;--aml:#FAC775;
  --bg:#F5F3EE;--card:#fff;--tx:#1a1a18;--mu:#6b6b65;--br:#E0DDD6;
  --rads:10px;--rad:16px;--sh:0 2px 12px rgba(0,0,0,.07);
}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--tx)}
.app{max-width:390px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--gd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700}
.back-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.page-title{font-size:17px;font-weight:800;color:#fff}
.lang-pill{display:flex;background:rgba(255,255,255,.15);border-radius:20px;overflow:hidden}
.lbtn{background:none;border:none;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:'Nunito',sans-serif}
.lbtn.on{background:rgba(255,255,255,.3);color:#fff}

/* BODY */
.body{flex:1;overflow-y:auto;padding:16px 16px 40px}

/* SUMMARY BANNER */
.summary{background:var(--al);border:2px solid var(--aml);border-radius:var(--rad);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sum-ico{width:42px;height:42px;background:var(--aml);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sum-ico svg{width:21px;height:21px;fill:none;stroke:#7A4A00;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sum-title{font-size:16px;font-weight:800;color:#7A4A00}
.sum-sub{font-size:12px;color:#AA6800;margin-top:2px;line-height:1.4}

/* SECTION LABEL */
.sec-lbl{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}

/* SWIPE-TO-DISMISS WRAPPER */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--rad);margin-bottom:10px}
.swipe-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#D32F2F;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border-radius:0 var(--rad) var(--rad) 0;flex-shrink:0}
.swipe-del-bg svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.swipe-del-bg span{font-size:10px;font-weight:800;color:#fff;letter-spacing:.3px}

/* ALERT CARD */
.alert-card{background:var(--card);border-radius:var(--rad);border:1.5px solid var(--aml);padding:0;overflow:hidden;margin-bottom:0;box-shadow:var(--sh);transform:translateX(0);transition:transform .25s ease;will-change:transform;position:relative;z-index:1}
.ac-head{padding:13px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.ac-head:active{opacity:.85}
.ac-dot{width:10px;height:10px;border-radius:50%;background:var(--am);flex-shrink:0;margin-top:5px}
.ac-info{flex:1;min-width:0}
.ac-title{font-size:15px;font-weight:800;line-height:1.3}
.ac-count{font-size:11px;color:var(--am);font-weight:700;margin-top:3px}
.ac-fix{background:var(--am);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;flex-shrink:0;white-space:nowrap}

/* SAFE STATE */
.safe-banner{background:var(--gl);border:2px solid var(--gm);border-radius:var(--rad);padding:20px;text-align:center;margin-bottom:16px}
.safe-ico{width:56px;height:56px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.safe-ico svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.safe-title{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:6px}
.safe-sub{font-size:14px;color:var(--gd);opacity:.8;line-height:1.5}

/* FULL SCREEN DETAIL */
.detail-screen{position:fixed;inset:0;background:#fff;z-index:500;display:none;flex-direction:column;max-width:390px;left:50%;transform:translateX(-50%)}
.detail-screen.show{display:flex}
.ds-top{background:var(--am);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ds-close{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.ds-close svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.ds-title{font-size:15px;font-weight:800;color:#fff;flex:1}
.ds-nav{display:flex;gap:6px;margin-left:auto}
.ds-nbtn{background:rgba(255,255,255,.25);border:none;border-radius:6px;padding:5px 10px;color:#fff;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.ds-nbtn:disabled{opacity:.3;cursor:default}
.ds-counter{font-size:12px;color:rgba(255,255,255,.8);font-weight:700;align-self:center}
.ds-body{flex:1;overflow-y:auto;padding:16px}

/* WHY DANGEROUS */
.why-box{background:#FFF8EC;border:1.5px solid var(--aml);border-radius:var(--rad);padding:14px 16px;margin-bottom:14px}
.why-label{font-size:12px;font-weight:800;color:var(--am);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.why-label svg{width:13px;height:13px;stroke:var(--am);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.why-text{font-size:15px;color:#7A4A00;line-height:1.7;font-family:'Literata',serif}

/* MESSAGE BOX */
.msg-box{background:var(--bg);border:1px solid var(--br);border-radius:var(--rad);padding:13px 14px;margin-bottom:16px}
.msg-box.expandable{cursor:pointer}
.msg-box.expandable:active{opacity:.8}
.msg-label{font-size:10px;font-weight:800;color:var(--mu);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px}
.msg-title{font-size:15px;font-weight:800;margin-bottom:4px}
.msg-count{font-size:12px;color:var(--am);font-weight:700}
.msg-see-more{font-size:12px;font-weight:800;color:var(--gd);margin-top:8px}
/* Suspicious email list */
.msg-email-list{margin-top:12px;border-top:1px solid var(--br);display:block}
.msg-email-row{padding:12px 0;border-bottom:1px solid var(--br)}
.msg-email-row:last-of-type{border-bottom:none;padding-bottom:0}
.msg-email-from{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-email-subject{font-size:15px;font-weight:800;margin-bottom:5px}
.msg-email-snip{font-size:13px;color:#444;line-height:1.5;margin-bottom:2px}
.msg-open-btn{display:inline-block;margin-top:6px;font-size:13px;font-weight:800;color:var(--gd);background:var(--gl);border-radius:8px;padding:6px 14px;text-decoration:none;border:1px solid var(--gm)}
.msg-goto-inbox{display:block;margin-top:12px;text-align:center;font-size:13px;font-weight:800;color:var(--gd);padding:10px;background:var(--gl);border-radius:10px;text-decoration:none;border:1.5px solid var(--gm)}

/* ACTION SECTION - VISUAL STEPS */
.action-section{margin-bottom:10px}
.action-sec-label{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:10px}
.action-btn{background:var(--card);border:1.5px solid var(--br);border-radius:var(--rad);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;margin-bottom:8px;transition:border-color .15s;-webkit-tap-highlight-color:transparent;text-align:left}
.action-btn:active{opacity:.85}
.action-btn.del{border-color:#FAC775}
.action-btn.spam{border-color:#B5D4F4}
.action-btn.fam{border-color:var(--gm)}
.action-btn.pwd{border-color:var(--br)}
.ab-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-ico svg{width:22px;height:22px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ab-txt{flex:1}
.ab-name{font-size:15px;font-weight:800;color:var(--tx)}
.ab-hint{font-size:12px;color:var(--mu);margin-top:2px;line-height:1.4}
.ab-arr{font-size:18px;color:var(--br)}

/* VISUAL STEP GUIDE */
.step-guide{position:fixed;inset:0;background:#fff;z-index:600;display:none;flex-direction:column;max-width:390px;left:50%;transform:translateX(-50%)}
.step-guide.show{display:flex}
.sg-top{background:var(--gd);padding:14px 16px;display:flex;align-items:center;gap:10px}
.sg-close{background:none;border:none;cursor:pointer;padding:4px}
.sg-close svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.sg-title{font-size:16px;font-weight:800;color:#fff}
.sg-body{flex:1;overflow-y:auto;padding:20px 16px 40px}
.sg-step{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px}
.sg-num{width:44px;height:44px;border-radius:50%;background:var(--gd);color:#fff;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sg-step-body{flex:1;padding-top:8px}
.sg-step-title{font-size:17px;font-weight:800;margin-bottom:4px}
.sg-step-desc{font-size:14px;color:var(--mu);line-height:1.6}
.sg-step-img{width:100%;border-radius:var(--rads);background:var(--bg);border:1px solid var(--br);margin-top:8px;padding:12px;display:flex;align-items:center;justify-content:center}
.sg-step-img svg{width:48px;height:48px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.sg-done{background:var(--gd);color:#fff;border:none;border-radius:var(--rads);padding:15px;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;margin-top:8px}

/* CONFIRM DIALOG */
.dialog-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700;display:none;align-items:flex-end;justify-content:center}
.dialog-ov.show{display:flex}
.dialog-sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:390px}
.dh{width:36px;height:4px;background:var(--br);border-radius:2px;margin:0 auto 16px}
.dt{font-size:18px;font-weight:800;margin-bottom:8px}
.db{font-size:14px;color:var(--mu);line-height:1.5;margin-bottom:20px}
.da{display:flex;gap:8px}
.dc{flex:1;background:var(--bg);border:1.5px solid var(--br);border-radius:var(--rads);padding:13px;font-size:15px;font-weight:800;color:var(--mu);font-family:'Nunito',sans-serif;cursor:pointer}
.dcon{flex:1;background:var(--am);border:none;border-radius:var(--rads);padding:13px;font-size:15px;font-weight:800;color:#fff;font-family:'Nunito',sans-serif;cursor:pointer}

/* SUCCESS SCREEN */
.success-screen{position:fixed;inset:0;background:var(--gd);z-index:800;display:none;flex-direction:column;align-items:center;justify-content:center;max-width:390px;left:50%;transform:translateX(-50%);padding:32px 28px;text-align:center}
.success-screen.show{display:flex}
.ss-ico{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.ss-ico svg{width:44px;height:44px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ss-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:10px}
.ss-body{font-size:16px;color:rgba(255,255,255,.85);line-height:1.6;margin-bottom:30px;font-family:'Literata',serif}
.ss-btn{background:#fff;color:var(--gd);border:none;border-radius:var(--rads);padding:15px 32px;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}

/* PAGE LOADER */
.page-loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.pl-spin{width:32px;height:32px;border:3px solid var(--gl);border-top-color:var(--gd);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">

  <div class="topbar">
    <button class="back-btn" onclick="goTo('home.html')">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="page-title" id="page-title-el">Alerts</span>
    <div class="lang-pill">
      <button class="lbtn on" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lbtn" id="btn-nl" onclick="setLang('nl')">NL</button>
    </div>
  </div>

  <div class="body">
    <div id="main-content"></div>
  </div>

</div>

<!-- DETAIL SCREEN -->
<div class="detail-screen" id="detail-screen">
  <div class="ds-top">
    <button class="ds-close" onclick="closeDetail()">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="ds-title" id="ds-title">Alert</span>
    <span class="ds-counter" id="ds-counter"></span>
    <div class="ds-nav">
      <button class="ds-nbtn" id="ds-prev" onclick="prevAlert()">←</button>
      <button class="ds-nbtn" id="ds-next" onclick="nextAlert()">→</button>
    </div>
  </div>
  <div class="ds-body" id="ds-body"></div>
</div>

<!-- STEP GUIDE -->
<div class="step-guide" id="step-guide">
  <div class="sg-top">
    <button class="sg-close" onclick="closeGuide()">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <span class="sg-title" id="sg-title">How to delete</span>
  </div>
  <div class="sg-body" id="sg-body"></div>
</div>

<!-- CONFIRM DIALOG -->
<div class="dialog-ov" id="dialog-ov">

      <button class="dcon" onclick="doAction()" id="d-confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- SUCCESS SCREEN -->
<div class="success-screen" id="success-screen">
  <div class="ss-ico"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
  <div class="ss-title" id="ss-title">Well done!</div>
  <div class="ss-body" id="ss-body">You handled this safely.</div>
  <button class="ss-btn" onclick="successDone()" id="ss-btn">Back to alerts</button>
</div>

<script>
var firebaseConfig={apiKey:"AIzaSyBZ83BoCVrUdnM_PGuvkl_j-DP3f-3XIIw",authDomain:"digimaat-e2885.firebaseapp.com",projectId:"digimaat-e2885",storageBucket:"digimaat-e2885.firebasestorage.app",messagingSenderId:"32711322292",appId:"1:32711322292:web:6cb53495a8b3eabfd845e1"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth();

// PER-USER STORAGE KEY
var currentUID='';
function storageKey(key){return currentUID?currentUID+'_'+key:key;}

auth.onAuthStateChanged(function(user){
  currentUID=user?user.uid:'';
  if(!user){window.location.href='register.html';return;}
  document.getElementById('page-loader').style.display='none';
  document.getElementById('app').style.display='flex';
  setLang(localStorage.getItem('dm_lang')||'en');
});

var lang='en';
function setLang(l){
  lang=l;localStorage.setItem('dm_lang',l);
  document.getElementById('html-root').setAttribute('lang',l);
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-nl').classList.toggle('on',l==='nl');
  document.getElementById('page-title-el').textContent=l==='nl'?'Meldingen':'Alerts';
  renderMain();
}
function goTo(p){window.location.href=p;}

// ── DATA ─────────────────────────────────────────────────
function getRecent(){try{return JSON.parse(localStorage.getItem(storageKey('dm_recent'))||'[]');}catch(e){return[];}}
function getDismissed(){try{return JSON.parse(localStorage.getItem(storageKey('dm_dismissed_alerts'))||'[]');}catch(e){return[];}}
function saveDismissed(d){localStorage.setItem(storageKey('dm_dismissed_alerts'),JSON.stringify(d));}

// DEDUPLICATE — group by normalised title, keep highest severity
function getUniqueAlerts(){
  var items=getRecent();
  var dismissed=getDismissed();
  var map={};
  items.forEach(function(item){
    if(item.severity!=='r'&&item.severity!=='a')return;
    if(dismissed.indexOf(item.time)!==-1)return;
    // Normalise title — remove counts like "3 suspicious..."
    var key=(item.title_en||'').replace(/^\d+\s+/,'').toLowerCase().substring(0,40);
    if(!map[key]){
      map[key]={item:item,count:1,latestTime:item.time};
    }else{
      map[key].count++;
      if(item.time>map[key].latestTime)map[key].latestTime=item.time;
      // Keep highest severity
      if(item.severity==='r')map[key].item.severity='r';
    }
  });
  return Object.values(map).sort(function(a,b){return b.latestTime-a.latestTime;});
}

function dismissItem(item){
  // Dismiss all items with same normalised title
  var key=(item.title_en||'').replace(/^\d+\s+/,'').toLowerCase().substring(0,40);
  var items=getRecent();
  var dismissed=getDismissed();
  items.forEach(function(i){
    var k=(i.title_en||'').replace(/^\d+\s+/,'').toLowerCase().substring(0,40);
    if(k===key&&dismissed.indexOf(i.time)===-1)dismissed.push(i.time);
  });
  saveDismissed(dismissed);
}

function swipeDismiss(idx){
  var alerts=getUniqueAlerts();
  if(!alerts[idx])return;
  var card=document.getElementById('acard-'+idx);
  var wrap=document.getElementById('swrap-'+idx);
  if(card){card.style.transition='transform .3s ease,opacity .3s ease';card.style.transform='translateX(-100%)';card.style.opacity='0';}
  setTimeout(function(){
    dismissItem(alerts[idx].item);
    renderMain();
  },280);
}

function initSwipeDelete(){
  document.querySelectorAll('.swipe-wrap').forEach(function(wrap){
    var card=wrap.querySelector('.alert-card');
    if(!card)return;
    var startX=0,startY=0,dx=0,open=false,dragging=false,cancelled=false;
    var SNAP=80,THRESH=50;
    wrap.addEventListener('touchstart',function(e){
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;
      dx=open?-SNAP:0;dragging=true;cancelled=false;
      card.style.transition='none';
    },{passive:true});
    wrap.addEventListener('touchmove',function(e){
      if(!dragging||cancelled)return;
      var mx=e.touches[0].clientX-startX;
      var my=e.touches[0].clientY-startY;
      // cancel if mostly vertical scroll
      if(!open&&Math.abs(my)>Math.abs(mx)&&Math.abs(my)>8){cancelled=true;return;}
      dx=Math.max(-SNAP,Math.min(0,(open?-SNAP:0)+mx));
      card.style.transform='translateX('+dx+'px)';
    },{passive:true});
    wrap.addEventListener('touchend',function(){
      if(!dragging)return;dragging=false;
      card.style.transition='transform .25s ease';
      if(cancelled){card.style.transform='translateX('+(open?-SNAP:0)+'px)';return;}
      if(dx<-(open?SNAP-THRESH:THRESH)){card.style.transform='translateX(-'+SNAP+'px)';open=true;}
      else{card.style.transform='translateX(0)';open=false;}
    });
  });
  // tap anywhere outside an open card to close it
  document.addEventListener('touchstart',function(e){
    document.querySelectorAll('.alert-card').forEach(function(c){
      if(!c.contains(e.target)&&c.style.transform==='translateX(-80px)'){
        c.style.transition='transform .25s ease';
        c.style.transform='translateX(0)';
      }
    });
  },{passive:true});
}

function timeAgo(ts){
  var diff=Math.floor((Date.now()-ts)/60000);
  if(diff<1)return lang==='nl'?'Zojuist':'Just now';
  if(diff<60)return lang==='nl'?diff+' min geleden':diff+' min ago';
  var h=Math.floor(diff/60);
  if(h<24)return lang==='nl'?h+' uur geleden':h+(h===1?' hour':' hours')+' ago';
  var d=Math.floor(h/24);
  return lang==='nl'?d+' dag'+(d>1?'en':'')+' geleden':d+' day'+(d>1?'s':'')+' ago';
}

// ── MAIN RENDER ───────────────────────────────────────────
function renderMain(){
  var alerts=getUniqueAlerts();
  var el=document.getElementById('main-content');
  if(alerts.length===0){
    el.innerHTML='<div class="safe-banner">'
      +'<div class="safe-ico"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>'

// ── DETAIL SCREEN ─────────────────────────────────────────
var currentIdx=0;
var pendingActionType=null;
var pendingItem=null;

function openDetail(idx){
  var alerts=getUniqueAlerts();
  if(!alerts.length)return;
  currentIdx=idx;
  renderDetail(alerts);
  document.getElementById('detail-screen').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('detail-screen').classList.remove('show');
  document.body.style.overflow='';
  renderMain();
}

function prevAlert(){var a=getUniqueAlerts();if(currentIdx>0){currentIdx--;renderDetail(a);}}
function nextAlert(){var a=getUniqueAlerts();if(currentIdx<a.length-1){currentIdx++;renderDetail(a);}}

function renderDetail(alerts){
  var a=alerts[currentIdx];
  var item=a.item;
  var total=alerts.length;
  var title=lang==='nl'?item.title_nl:item.title_en;
  title=title.replace(/^\d+\s+/,'');
  title=title.charAt(0).toUpperCase()+title.slice(1);

  document.getElementById('ds-title').textContent=lang==='nl'?'Melding '+(currentIdx+1):'Alert '+(currentIdx+1);
  document.getElementById('ds-counter').textContent=(currentIdx+1)+' / '+total;
  document.getElementById('ds-prev').disabled=currentIdx===0;
  document.getElementById('ds-next').disabled=currentIdx===total-1;

  var why=getWhyText(item);
  var _g=getPrimaryGuardian();
  var familyName=_g?_g.name.split(' ')[0]:(lang==='nl'?'uw familielid':'your family member');

  var html='<div class="why-box">'
    +'<div class="why-label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    +(lang==='nl'?'Waarom is dit een probleem?':'Why is this a problem?')+'</div>'
    +'<div class="why-text">'+why+'</div>'
    +'</div>'

    +buildMsgBox(a,item,title,lang)

    +'<div class="action-section">'
    +'<div class="action-sec-label">'+(lang==='nl'?'Kies wat u wilt doen:':'Choose what to do:')+'</div>'

    // DELETE
    +'<button class="action-btn del" onclick="showGuide(\'delete\',\''+escTitle(title)+'\')">'
    +'<div class="ab-ico" style="background:#FFF3CD">'
    +'<svg viewBox="0 0 24 24" style="stroke:#7A4A00;width:26px;height:26px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>'
    +'</div>'
    +'<div class="ab-txt">'
    +'<div class="ab-name">'+(lang==='nl'?'Verwijderen':'Delete')+'</div>'
    +'<div class="ab-hint">'+(lang==='nl'?'Gooi dit bericht in de prullenbak':'Throw this message in the bin')+'</div>'
    +'</div><span class="ab-arr">›</span></button>'

    // SPAM
    +'<button class="action-btn spam" onclick="showGuide(\'spam\',\''+escTitle(title)+'\')">'
    +'<div class="ab-ico" style="background:#E6F1FB">'
    +'<svg viewBox="0 0 24 24" style="stroke:#185FA5;width:26px;height:26px"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'
    +'</div>'
    +'<div class="ab-txt">'
    +'<div class="ab-name">'+(lang==='nl'?'Blokkeren':'Block sender')+'</div>'
    +'<div class="ab-hint">'+(lang==='nl'?'Blokkeer de afzender — ze kunnen u niet meer bereiken':'Block the sender — they cannot contact you again')+'</div>'
    +'</div><span class="ab-arr">›</span></button>'

    // FAMILY
    +'<button class="action-btn fam" onclick="askFamily(\''+escTitle(title)+'\')">'
    +'<div class="ab-ico" style="background:var(--gl)">'
    +'<svg viewBox="0 0 24 24" style="stroke:var(--gd);width:26px;height:26px"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.09 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6"/></svg>'
    +'</div>'

    +'<div class="ab-name">'+(lang==='nl'?'Bel '+familyName+' om hulp':'Call '+familyName+' for help')+'</div>'
    +'<div class="ab-hint">'+(lang==='nl'?''+familyName+' kan u helpen dit op te lossen':''+familyName+' can help you fix this')+'</div>'
    +'</div><span class="ab-arr">›</span></button>'

    // PASSWORD
    +'<button class="action-btn pwd" onclick="showGuide(\'password\',\''+escTitle(title)+'\')">'
    +'<div class="ab-ico" style="background:var(--bg)">'
    +'<svg viewBox="0 0 24 24" style="stroke:var(--gd);width:26px;height:26px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1" fill="var(--gd)"/></svg>'

  // Cache inbox emails so showGuide() can inject direct Gmail links
  currentGuideEmails=[];

    currentGuideEmails=(_lr&&_lr.suspicious)||[];
  }
}

function escTitle(t){return t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function toggleEmailList(){
  var l=document.getElementById('ds-email-list');
  var lbl=document.getElementById('ds-see-more');
  if(!l||!lbl)return;
  var open=l.style.display==='block';
  l.style.display=open?'none':'block';
  lbl.textContent=open
    ?('▼ '+lbl.dataset.count+' '+(lang==='nl'?'berichten — tik om te bekijken':'messages — tap to see'))
    :('▲ '+(lang==='nl'?'Verbergen':'Hide'));
}

function buildMsgBox(a,item,title,lang){
  var isInbox=(item.title_en||'').indexOf('inbox scan')!==-1;
  var lr=null;var msgs=[];
  if(isInbox){try{lr=JSON.parse(localStorage.getItem(storageKey('dm_last_results'))||'null');}catch(e){}msgs=(lr&&lr.suspicious)||[];}
  var emailListHtml='';
  if(isInbox&&msgs.length){
    emailListHtml='<div class="msg-email-list">'
      +msgs.slice(0,5).map(function(m){
        var gmailLink=m.id?'https://mail.google.com/mail/u/0/#inbox/'+m.id:'https://mail.google.com';
        var snip=m.snippet||(lang==='nl'?'(Tik op "Open in Gmail" om de inhoud te lezen)':'(Tap "Open in Gmail" to read the content)');
        return '<div class="msg-email-row">'
          +'<div class="msg-email-from">'+(lang==='nl'?'Van: ':'From: ')+(m.from||'Unknown sender')+'</div>'
          +'<div class="msg-email-subject">'+(m.subject||(lang==='nl'?'(geen onderwerp)':'(no subject)'))+'</div>'
          +'<div class="msg-email-snip">'+snip+'</div>'
          +'<a class="msg-open-btn" href="'+gmailLink+'" target="_blank">'
          +(lang==='nl'?'Open in Gmail →':'Open in Gmail →')
          +'</a>'
          +'</div>';
      }).join('')
      +(msgs.length>5?'<a class="msg-goto-inbox" href="inbox.html">'+(lang==='nl'?'Alle verdachte berichten bekijken →':'View all suspicious messages →')+'</a>':'')
      +'</div>';
  }
  return '<div class="msg-box">'+
    '<div class="msg-label">'+(lang==='nl'?'Gevonden probleem':'Problem found')+'</div>'+
    '<div class="msg-title">'+title+'</div>'+
    (a.count>1?'<div class="msg-count">'+(lang==='nl'?a.count+'× gevonden':a.count+'× found')+'</div>':'')+
    emailListHtml+
    '</div>';
}

function getWhyText(item){
  var t=(item.title_en||'').toLowerCase();
  if(lang==='nl'){
    if(t.includes('breach')||t.includes('leak')||t.includes('linkedin')||t.includes('lek'))
      return 'Uw e-mailadres is gelekt bij een hack. Criminelen kunnen dit gebruiken om u nep-berichten te sturen of uw wachtwoord te raden. Verander uw wachtwoord nu.';
    if(t.includes('scam')||t.includes('suspicious')||t.includes('inbox'))
      return 'Er zijn nep-berichten gevonden die lijken op oplichting. Deze berichten proberen u te misleiden om op een link te klikken of persoonlijke gegevens te geven. Verwijder ze.';
    return 'DigiMaat heeft iets gevonden dat gevaarlijk kan zijn voor uw digitale veiligheid. Kies hieronder wat u wilt doen.';
  }else{
    if(t.includes('breach')||t.includes('leak')||t.includes('linkedin'))
      return 'Your email address was leaked in a hack. Criminals can use it to send you fake messages or guess your password. Change your password now to stay safe.';
    if(t.includes('scam')||t.includes('suspicious')||t.includes('inbox'))
      return 'Fake messages were found that look like scams. These messages try to trick you into clicking a link or giving personal information. Delete them now.';
    return 'DigiMaat found something that could be dangerous for your online safety. Choose below what you would like to do.';
  }
}

var currentGuideAction=null;
var currentGuideTitle=null;

function showGuide(action,title){
  currentGuideAction=action;
  currentGuideTitle=title;
  var guide=GUIDES[action][lang];
  document.getElementById('sg-title').textContent=guide.title;
  var html='';

  // For delete/spam: show direct Gmail links at the top so user can open the email first
  if((action==='delete'||action==='spam')&&currentGuideEmails.length){
    html+='<div style="background:#FFF8EC;border:1.5px solid var(--aml);border-radius:14px;padding:14px 14px 6px;margin-bottom:18px">'
      +'<div style="font-size:13px;font-weight:800;color:var(--am);margin-bottom:10px">'
      +(lang==='nl'?'Stap 1 — Open de verdachte e-mail in Gmail:':'Step 1 — Open the suspicious email in Gmail:')
      +'</div>'
      +currentGuideEmails.slice(0,5).map(function(m){
        var link=m.id?'https://mail.google.com/mail/u/0/#inbox/'+m.id:'https://mail.google.com';
        return '<a href="'+link+'" target="_blank" style="display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--aml);border-radius:10px;padding:10px 12px;margin-bottom:8px;text-decoration:none">'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:11px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(m.from||'Unknown sender')+'</div>'
          +'<div style="font-size:14px;font-weight:800;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(m.subject||(lang==='nl'?'Geen onderwerp':'No subject'))+'</div>'
          +'</div>'
          +'<div style="background:var(--gd);color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:800;flex-shrink:0">'+(lang==='nl'?'Open →':'Open →')+'</div>'
          +'</a>';
      }).join('')
      +'<div style="font-size:12px;color:var(--mu);margin-bottom:10px;line-height:1.5">'
      +(lang==='nl'?'Na het openen van de e-mail, volg dan de stappen hieronder:':'After opening the email, follow the steps below:')
      +'</div>'
      +'</div>';
  }

  guide.steps.forEach(function(step){
    html+='<div class="sg-step">'
      +'<div class="sg-num">'+step.n+'</div>'
      +'<div class="sg-step-body">'
      +'<div class="sg-step-title">'+step.title+'</div>'
      +'<div class="sg-step-desc">'+step.desc+'</div>'
      +'<div class="sg-step-img" style="margin-top:10px">'+step.icon+'</div>'
      +'</div></div>';
  });
  // Done button
  if(action==='password'){
    html+='<button class="sg-done" onclick="markDone()">'+(lang==='nl'?'Wachtwoord gewijzigd — klaar!':'Password changed — done!')+'</button>';
  }else{
    html+='<button class="sg-done" onclick="confirmFromGuide()">'+(lang==='nl'?'Ik heb dit gedaan — klaar!':'I have done this — done!')+'</button>';
  }
  document.getElementById('sg-body').innerHTML=html;
  document.getElementById('step-guide').classList.add('show');
}

function closeGuide(){document.getElementById('step-guide').classList.remove('show');}

function confirmFromGuide(){
  closeGuide();
  showSuccess(currentGuideAction);
}
function markDone(){
  closeGuide();
  showSuccess('password');
}

function showSuccess(action){
  if(pendingItem)dismissItem(pendingItem);
  var titles={delete:{en:'Message deleted!',nl:'Bericht verwijderd!'},spam:{en:'Sender blocked!',nl:'Afzender geblokkeerd!'},password:{en:'Password changed!',nl:'Wachtwoord gewijzigd!'}};
  var bodies={
    delete:{en:'The message is in the bin. You are safer now.',nl:'Het bericht zit in de prullenbak. U bent nu veiliger.'},
    spam:{en:'The sender is blocked. They cannot contact you again.',nl:'De afzender is geblokkeerd. Ze kunnen u niet meer bereiken.'},
    password:{en:'Your new password is active. Your account is more secure.',nl:'Uw nieuwe wachtwoord is actief. Uw account is veiliger.'}
  };
  document.getElementById('ss-title').textContent=titles[action]?titles[action][lang]:(lang==='nl'?'Goed gedaan!':'Well done!');
  document.getElementById('ss-body').textContent=bodies[action]?bodies[action][lang]:(lang==='nl'?'U heeft dit veilig afgehandeld.':'You handled this safely.');
  var remaining=getUniqueAlerts();
  document.getElementById('ss-btn').textContent=remaining.length>0
    ?(lang==='nl'?'Volgende melding →':'Next alert →')
    :(lang==='nl'?'Terug naar startpagina':'Back to home');
  document.getElementById('success-screen').classList.add('show');
  document.getElementById('detail-screen').classList.remove('show');
  document.body.style.overflow='hidden';
}

function successDone(){
  document.getElementById('success-screen').classList.remove('show');
  document.body.style.overflow='';
  var remaining=getUniqueAlerts();
  if(remaining.length>0){openDetail(0);}
  else{renderMain();goTo('home.html');}
}

function getPrimaryGuardian(){
  var guardians=[];
  try{guardians=JSON.parse(localStorage.getItem(storageKey('dm_my_guardians'))||'[]');}catch(e){}
  return guardians.find(function(g){return g.isPrimary;})||guardians[0]||null;
}

function askFamily(title){
  var g=getPrimaryGuardian();
  if(!g||!g.phone){
    alert(lang==='nl'?'Voeg eerst een contactpersoon met telefoonnummer toe via de Familiepagina.':'Please add a guardian with a phone number on the Family page.');
    return;
  }
  var fname=g.name.split(' ')[0];
  var user=JSON.parse(localStorage.getItem('dm_user')||'{}');
  var uname=user.name?user.name.split(' ')[0]:'Jan';
  var msg=lang==='nl'
    ?'Hoi '+fname+', DigiMaat heeft een probleem gevonden voor '+uname+': "'+title+'". Kun jij me helpen dit op te lossen? Groet, '+uname
    :'Hi '+fname+', DigiMaat found a problem for '+uname+': "'+title+'". Can you help me fix this? Thanks, '+uname;
  var phone=g.phone.replace(/[\s\+\-\(\)]/g,'');
  if(phone.startsWith('0'))phone='31'+phone.substring(1);
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
}
</script>
