<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon192.png"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon192.png"/>
<title>DigiMaat — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Literata:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--gd:#0F6E56;--gl:#E1F5EE;--gm:#9FE1CB;
  --am:#BA7517;--al:#FAEEDA;--r:#A32D2D;--rl:#FCEBEB;
  --bg:#F5F3EE;--card:#fff;--tx:#1a1a18;--mu:#6b6b65;--br:#E0DDD6;
  --rads:10px;--rad:16px;--sh:0 2px 12px rgba(0,0,0,.07);
}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--tx)}
.app{max-width:390px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--gd);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tl{display:flex;align-items:center;gap:9px}
.logo{width:30px;height:30px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo svg{width:17px;height:17px;stroke:var(--g);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.appname{font-size:16px;font-weight:800;color:#fff}
.tr{display:flex;align-items:center;gap:8px}
.lang-pill{display:flex;background:rgba(255,255,255,.15);border-radius:20px;overflow:hidden}
.lbtn{background:none;border:none;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.lbtn.on{background:rgba(255,255,255,.3);color:#fff}
.ava-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
.ava-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* SCROLL BODY */
.body{flex:1;overflow-y:auto;padding:0 0 90px;-webkit-overflow-scrolling:touch}

/* GREETING */
.greeting{padding:16px 18px 4px}
.g-name{font-size:22px;font-weight:800}
.g-date{font-size:12px;color:var(--mu);margin-top:2px}

/* STATUS BANNER */
.status-banner{margin:12px 18px 0;background:var(--g);border-radius:var(--rad);padding:14px 16px;display:flex;align-items:center;gap:12px}
.s-icon{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-icon svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.s-title{font-size:15px;font-weight:800;color:#fff}
.s-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}

/* SECTION LABEL */
.sec-label{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:.5px;text-transform:uppercase;margin:16px 18px 8px}

/* ACTION GRID */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 18px}
.ac{background:var(--card);border-radius:var(--rad);border:1px solid var(--br);padding:13px;cursor:pointer;display:flex;flex-direction:column;gap:6px;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.ac:active{transform:scale(.97);box-shadow:none}
.ac-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.ac-icon svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ac-title{font-size:13px;font-weight:800}
.ac-sub{font-size:11px;color:var(--mu);line-height:1.3}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.badge-r{background:var(--rl);color:var(--r)}
.badge-g{background:var(--gl);color:var(--gd)}
.badge-a{background:var(--al);color:var(--am)}

/* RECENT */
.recent-list{display:flex;flex-direction:column;gap:7px;margin:0 18px}
.rrow{background:var(--card);border-radius:var(--rads);border:1px solid var(--br);padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--sh);-webkit-tap-highlight-color:transparent}
.rrow:active{opacity:.8}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ri{flex:1;min-width:0}
.rt{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs{font-size:11px;color:var(--mu);margin-top:1px}
.rarr{width:14px;height:14px;stroke:var(--br);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.empty-recent{text-align:center;padding:20px;color:var(--mu);font-size:13px;line-height:1.6}
.empty-recent svg{width:32px;height:32px;stroke:var(--br);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 8px;display:block}

/* EMERGENCY BUTTON */
.emergency-btn{position:fixed;bottom:72px;right:calc(50% - 185px);z-index:200;display:flex;align-items:center;gap:8px;background:var(--r);color:#fff;border:none;border-radius:30px;padding:11px 16px 11px 13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(163,45,45,.35);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.emergency-btn:active{transform:scale(.96);box-shadow:0 2px 8px rgba(163,45,45,.3)}
.emergency-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.emergency-btn .eb-label{display:flex;flex-direction:column;align-items:flex-start;line-height:1.2}
.emergency-btn .eb-name{font-size:13px;font-weight:800}
.emergency-btn .eb-hint{font-size:10px;font-weight:600;opacity:.85}
/* No contact state */
.emergency-btn.no-contact{background:var(--mu)}
.emergency-btn.no-contact{box-shadow:0 4px 16px rgba(107,107,101,.25)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#fff;border-top:1px solid var(--br);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
.nb svg{width:21px;height:21px;stroke:var(--mu);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.nb span{font-size:9px;color:var(--mu);font-weight:700;transition:color .15s}
.nb.on svg{stroke:var(--g)}.nb.on span{color:var(--g)}

/* ALERT RESOLUTION STYLES */
.alert-banner{margin:12px 18px 0;border-radius:var(--rad);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity .15s}
.alert-banner:active{opacity:.85}
.alert-banner.safe{background:var(--g)}
.alert-banner.danger{background:var(--r)}
.ab-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ab-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ab-text{flex:1}
.ab-title{font-size:15px;font-weight:800;color:#fff}
.ab-sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px}
.ab-arr{font-size:20px;color:rgba(255,255,255,.7);font-weight:700}

/* ALERT LIST VIEW */
.alert-list-wrap{padding:0 18px;margin-top:14px}
.alert-list-title{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.alert-item{background:var(--card);border-radius:var(--rad);border:1px solid var(--br);padding:13px 14px;display:flex;align-items:center;gap:11px;margin-bottom:8px;cursor:pointer;box-shadow:var(--sh);transition:transform .15s}
.alert-item:active{transform:scale(.98)}
.ai-sev{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ai-body{flex:1;min-width:0}
.ai-title{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-from{font-size:11px;color:var(--mu);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:5px;display:inline-block}
.ai-tag.r{background:var(--rl);color:var(--r)}
.ai-tag.a{background:var(--al);color:var(--am)}
.fix-btn{background:var(--r);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;flex-shrink:0;white-space:nowrap}

/* FULL SCREEN DETAIL */
.detail-screen{position:fixed;inset:0;background:#fff;z-index:500;display:none;flex-direction:column;max-width:390px;left:50%;transform:translateX(-50%)}
.detail-screen.show{display:flex}
.ds-topbar{background:var(--r);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ds-close{background:none;border:none;cursor:pointer;padding:0}
.ds-close svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;display:block}
.ds-progress{font-size:12px;color:rgba(255,255,255,.8);font-weight:700;margin-left:auto}
.ds-nav{display:flex;gap:6px}
.ds-nav-btn{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:5px 10px;color:#fff;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}
.ds-nav-btn:disabled{opacity:.3;cursor:default}
.ds-body{flex:1;overflow-y:auto;padding:18px 18px 20px}
/* WHY DANGEROUS box */
.why-box{background:var(--rl);border-radius:var(--rad);padding:14px 16px;margin-bottom:16px}
.why-title{font-size:13px;font-weight:800;color:var(--r);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.why-title svg{width:14px;height:14px;stroke:var(--r);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.why-text{font-size:14px;color:#791F1F;line-height:1.6;font-family:'Literata',serif}
/* Message preview */
.msg-box{background:var(--bg);border:1px solid var(--br);border-radius:var(--rad);padding:13px 14px;margin-bottom:16px}
.msg-box.expandable{cursor:pointer}
.msg-box.expandable:active{opacity:.8}
.msg-label{font-size:10px;font-weight:800;color:var(--mu);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px}
.msg-from{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:6px}
.msg-subject{font-size:15px;font-weight:800;margin-bottom:8px}
.msg-body{font-size:13px;color:var(--mu);line-height:1.6;font-family:'Literata',serif;white-space:pre-wrap}
.msg-see-more{font-size:12px;font-weight:800;color:var(--gd);margin-top:6px}
.msg-email-list{margin-top:12px;border-top:1px solid var(--br);display:none}
.msg-email-row{padding:8px 0;border-bottom:1px solid var(--br)}
.msg-email-row:last-of-type{border-bottom:none}
.msg-email-from{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-email-subject{font-size:13px;font-weight:800;margin-bottom:2px}
.msg-email-snip{font-size:11px;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-goto-inbox{display:block;margin-top:10px;text-align:center;font-size:13px;font-weight:800;color:var(--gd);padding:9px;background:var(--gl);border-radius:8px;text-decoration:none}
/* Actions */
.action-label{font-size:11px;font-weight:800;color:var(--mu);letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px}
.action-grid{display:flex;flex-direction:column;gap:8px}
.action-card{background:var(--card);border:1.5px solid var(--br);border-radius:var(--rad);padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.action-card:active{transform:scale(.98)}
.action-card.delete{border-color:#F09595}
.action-card.spam{border-color:#FAC775}
.action-card.family{border-color:var(--gm)}
.action-card.password{border-color:#B5D4F4}
.ac-ico2{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ac-ico2 svg{width:17px;height:17px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ac-info{flex:1}
.ac-name{font-size:14px;font-weight:800}
.ac-desc{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.4}
.ac-chev{width:16px;height:16px;stroke:var(--br);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* CONFIRMATION SCREEN */
.confirm-screen{position:fixed;inset:0;background:var(--gd);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;max-width:390px;left:50%;transform:translateX(-50%);padding:32px 28px;text-align:center}
.confirm-screen.show{display:flex}
.confirm-ico{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
.confirm-ico svg{width:40px;height:40px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.confirm-title{font-size:24px;font-weight:800;color:#fff;margin-bottom:10px}
.confirm-body{font-size:15px;color:rgba(255,255,255,.85);line-height:1.6;margin-bottom:28px;font-family:'Literata',serif}
.confirm-done{background:#fff;color:var(--gd);border:none;border-radius:var(--rads);padding:14px 32px;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer}

/* CONFIRM DIALOG */
.confirm-dialog{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:700;display:none;align-items:flex-end;justify-content:center}
.confirm-dialog.show{display:flex}
.cd-sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 36px;width:100%;max-width:390px}
.cd-handle{width:36px;height:4px;background:var(--br);border-radius:2px;margin:0 auto 16px}
.cd-title{font-size:17px;font-weight:800;margin-bottom:8px}
.cd-body{font-size:14px;color:var(--mu);line-height:1.5;margin-bottom:18px}
.cd-actions{display:flex;gap:8px}
.cd-cancel{flex:1;background:var(--bg);border:1.5px solid var(--br);border-radius:var(--rads);padding:13px;font-size:15px;font-weight:800;color:var(--mu);font-family:'Nunito',sans-serif;cursor:pointer}
.cd-confirm{flex:1;border:none;border-radius:var(--rads);padding:13px;font-size:15px;font-weight:800;color:#fff;font-family:'Nunito',sans-serif;cursor:pointer;background:var(--r)}
.page-loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.page-loader .spin{width:32px;height:32px;border:3px solid var(--gl);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tl">
      <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 3L4 7v5c0 4.418 3.582 8 8 8s8-3.582 8-8V7L12 3z"/><path d="M9 12l2 2 4-4"/></svg></div>
      <span class="appname">DigiMaat</span>
    </div>
    <div class="tr">
      <div class="lang-pill">
        <button class="lbtn on" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lbtn" id="btn-nl" onclick="setLang('nl')">NL</button>
      </div>
      <button class="ava-btn" id="ava-btn" onclick="goTo('profile.html')" title="Profile">
        <span id="ava-initials">?</span>
      </button>
    </div>
  </div>

  <!-- SCROLL BODY -->
  <div class="body">

    <!-- GREETING -->
    <div class="greeting">
      <div class="g-name" id="greeting-text">Good morning</div>
      <div class="g-date" id="greeting-date"></div>
    </div>

    <!-- STATUS BANNER -->
    <div class="status-banner">
      <div class="s-icon"><svg viewBox="0 0 24 24"><path d="M12 3L4 7v5c0 4.418 3.582 8 8 8s8-3.582 8-8V7L12 3z"/><path d="M9 12l2 2 4-4"/></svg></div>
      <div>
        <div class="s-title" data-en="You are protected" data-nl="U bent beschermd">You are protected</div>
        <div class="s-sub" id="last-check-text"></div>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="sec-label" data-en="Quick actions" data-nl="Snelle acties">Quick actions</div>
    <div class="ag">

      <div class="ac" onclick="goTo('breach.html')">
        <div class="ac-icon" style="background:var(--rl)">
          <svg viewBox="0 0 24 24" style="stroke:var(--r)"><path d="M12 3L4 7v5c0 4.418 3.582 8 8 8s8-3.582 8-8V7L12 3z"/><path d="M12 8v4M12 16h.01"/></svg>
        </div>
        <div class="ac-title" data-en="Breach alerts" data-nl="Lek-alerts">Breach alerts</div>
        <span class="badge badge-r" data-en="Check now" data-nl="Nu checken">Check now</span>
      </div>

      <div class="ac" onclick="goTo('scam.html')">
        <div class="ac-icon" style="background:var(--al)">
          <svg viewBox="0 0 24 24" style="stroke:var(--am)"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <div class="ac-title" data-en="Check message" data-nl="Bericht checken">Check message</div>
        <div class="ac-sub" data-en="Is this a scam?" data-nl="Is dit oplichting?">Is this a scam?</div>
      </div>

      <div class="ac" onclick="goTo('inbox.html')">
        <div class="ac-icon" style="background:#E6F1FB">
          <svg viewBox="0 0 24 24" style="stroke:#185FA5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="ac-title" data-en="Inbox scan" data-nl="Inbox scan">Inbox scan</div>
        <span class="badge badge-g" data-en="New" data-nl="Nieuw">New</span>
      </div>

      <div class="ac" onclick="goTo('family.html')">
        <div class="ac-icon" style="background:var(--gl)">
          <svg viewBox="0 0 24 24" style="stroke:var(--g)"><circle cx="8" cy="7" r="4"/><path d="M2 20c0-4 2.686-6 6-6s6 2 6 6"/><circle cx="18" cy="9" r="3"/></svg>
        </div>
        <div class="ac-title" data-en="Family" data-nl="Familie">Family</div>
        <div class="ac-sub" id="family-sub" data-en="Not connected" data-nl="Niet verbonden">Not connected</div>
      </div>

    </div>

    <!-- SMART ALERT BANNER (replaces status banner) -->
    <div id="smart-banner"></div>

    <!-- ALERT LIST (shown when alerts exist) -->
    <div id="alert-list-section"></div>

    <!-- ALERTS BUTTON (always shown) -->
    <div id="safe-section">
      <div id="alerts-btn-wrap"></div>
    </div>

  </div><!-- /body -->

  <!-- ══ FULL SCREEN DETAIL ══ -->
  <div class="detail-screen" id="detail-screen">
    <div class="ds-topbar">
      <button class="ds-close" onclick="closeDetail()">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span style="font-size:14px;font-weight:800;color:#fff" id="ds-label">Alert</span>
      <span class="ds-progress" id="ds-progress">1 / 3</span>
      <div class="ds-nav">
        <button class="ds-nav-btn" id="ds-prev" onclick="prevAlert()">←</button>
        <button class="ds-nav-btn" id="ds-next" onclick="nextAlert()">→</button>
      </div>
    </div>
    <div class="ds-body" id="ds-body"></div>
  </div>

  <!-- ══ CONFIRMATION SCREEN ══ -->
  <div class="confirm-screen" id="confirm-screen">
    <div class="confirm-ico">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="confirm-title" id="confirm-title">You handled this safely</div>
    <div class="confirm-body" id="confirm-body">Well done. This message has been deleted.</div>

<script>
// FIREBASE
var firebaseConfig={apiKey:"AIzaSyBZ83BoCVrUdnM_PGuvkl_j-DP3f-3XIIw",authDomain:"digimaat-e2885.firebaseapp.com",projectId:"digimaat-e2885",storageBucket:"digimaat-e2885.firebasestorage.app",messagingSenderId:"32711322292",appId:"1:32711322292:web:6cb53495a8b3eabfd845e1"};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth();

// PER-USER STORAGE KEY
var currentUID='';
function storageKey(key){return currentUID?currentUID+'_'+key:key;}

// LANGUAGE
var lang=localStorage.getItem('dm_lang')||'en';
function setLang(l){
  lang=l;localStorage.setItem('dm_lang',l);
  document.getElementById('html-root').setAttribute('lang',l);
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.getElementById('btn-nl').classList.toggle('on',l==='nl');
  document.querySelectorAll('[data-en]').forEach(function(el){
    var v=el.getAttribute('data-'+l);if(!v)return;
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.placeholder=v;
    else el.textContent=v;
  });
  // Re-render dynamic content in correct language
  updateGreeting();
  renderRecent();
  updateEmergencyBtn();
}

// NAVIGATE
function goTo(page){window.location.href=page;}

// GREETING
var DAYS_EN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var DAYS_NL=['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
var MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_NL=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

function updateGreeting(){
  var user=JSON.parse(localStorage.getItem('dm_user')||'{}');
  var name=user.name?user.name.split(' ')[0]:'';
  var h=new Date().getHours();
  var greet;
  if(lang==='nl'){
    greet=h<12?'Goedemorgen':h<17?'Goedemiddag':'Goedenavond';
    if(name)greet+=', '+name;
  }else{
    greet=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
    if(name)greet+=', '+name;
  }
  document.getElementById('greeting-text').textContent=greet;

  var now=new Date();
  var dateStr=lang==='nl'
    ?DAYS_NL[now.getDay()]+' '+now.getDate()+' '+MONTHS_NL[now.getMonth()]
    :DAYS_EN[now.getDay()]+', '+MONTHS_EN[now.getMonth()]+' '+now.getDate();
  document.getElementById('greeting-date').textContent=dateStr;

  // Last check text
  var lastCheck=localStorage.getItem('dm_last_check');
  var checkStr;
  if(lastCheck){
    var diff=Math.floor((Date.now()-parseInt(lastCheck))/60000);
    if(diff<60){
      checkStr=lang==='nl'?'Laatste controle '+diff+' minuten geleden':'Last checked '+diff+' minutes ago';
    }else{
      var hrs=Math.floor(diff/60);
      checkStr=lang==='nl'?'Laatste controle '+hrs+' uur geleden':'Last checked '+hrs+' hours ago';
    }
  }else{
    checkStr=lang==='nl'?'Nog niet gecontroleerd — check nu':'Not yet checked — check now';
  }
  document.getElementById('last-check-text').textContent=checkStr;
}

// AVATAR
function setAvatar(user){
  var btn=document.getElementById('ava-btn');
  var initEl=document.getElementById('ava-initials');
  if(user.photo){
    btn.innerHTML='<img src="'+user.photo+'" alt="avatar"/>';
  }else{
    var initials=(user.name||'?').split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
    initEl.textContent=initials;
  }
}

// RECENT ACTIVITY
// Each item: {type, title_en, title_nl, time, severity}
// severity: 'r'=red, 'a'=amber, 'g'=green
function getRecent(){
  try{return JSON.parse(localStorage.getItem(storageKey('dm_recent'))||'[]');}catch(e){return[];}
}

function timeAgo(ts){
  var diff=Math.floor((Date.now()-ts)/60000);
  if(diff<1)return lang==='nl'?'Zojuist':'Just now';
  if(diff<60)return lang==='nl'?diff+' min geleden':diff+' min ago';
  var h=Math.floor(diff/60);
  if(h<24)return lang==='nl'?h+' uur geleden':h+' hour'+(h>1?'s':'')+' ago';
  var d=Math.floor(h/24);
  return lang==='nl'?d+' dag'+(d>1?'en':'')+' geleden':d+' day'+(d>1?'s':'')+' ago';
}

var DEST={breach:'breach.html',scam:'scam.html',inbox:'inbox.html',family:'family.html'};
var DOT_COLORS={r:'var(--r)',a:'var(--am)',g:'#3B6D11'};

function renderRecent(){
  var list=document.getElementById('recent-list');
  var items=getRecent().slice(0,5); // show last 5
  if(items.length===0){
    list.innerHTML='<div class="empty-recent"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>'+(lang==='nl'?'Nog geen recente activiteit.<br>Gebruik een functie om te beginnen.':'No recent activity yet.<br>Use a feature to get started.')+'</div>';
    return;
  }
  list.innerHTML=items.map(function(item){
    var title=lang==='nl'?item.title_nl:item.title_en;
    var dest=DEST[item.type]||'home.html';
    var color=DOT_COLORS[item.severity]||DOT_COLORS.g;
    return '<div class="rrow" onclick="goTo(\''+dest+'\')">'
      +'<div class="rdot" style="background:'+color+'"></div>'
      +'<div class="ri"><div class="rt">'+title+'</div><div class="rs">'+timeAgo(item.time)+'</div></div>'
      +'<svg class="rarr" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>'
      +'</div>';
  }).join('');
}

// PRIMARY GUARDIAN HELPER
function getPrimaryGuardian(){
  var guardians=[];
  try{guardians=JSON.parse(localStorage.getItem(storageKey('dm_my_guardians'))||'[]');}catch(e){}
  return guardians.find(function(g){return g.isPrimary;})||guardians[0]||null;
}

// EMERGENCY BUTTON
function updateEmergencyBtn(){
  var g=getPrimaryGuardian();
  var btn=document.getElementById('emergency-btn');
  var nameEl=document.getElementById('eb-name');
  var hintEl=document.getElementById('eb-hint');
  if(g&&g.name){
    btn.classList.remove('no-contact');
    nameEl.textContent=g.name.split(' ')[0];
    hintEl.textContent=g.phone?(lang==='nl'?'Tik om te bellen':'Tap to call'):(lang==='nl'?'Geen nummer opgegeven':'No number added');
    if(g.phone)btn.title=g.phone;
  }else{
    btn.classList.add('no-contact');
    nameEl.textContent=lang==='nl'?'Contact toevoegen':'Add contact';
    hintEl.textContent=lang==='nl'?'Tik om in te stellen':'Tap to set up';
  }
}

function emergencyCall(){
  var g=getPrimaryGuardian();
  if(g&&g.phone){
    window.location.href='tel:'+g.phone.replace(/\s/g,'');
  }else{
    window.location.href='family.html';
  }
}
function addRecent(type,title_en,title_nl,severity){
  var items=getRecent();
  items.unshift({type:type,title_en:title_en,title_nl:title_nl,time:Date.now(),severity:severity||'g'});
  if(items.length>20)items=items.slice(0,20);
  localStorage.setItem(storageKey('dm_recent'),JSON.stringify(items));
}

// FAMILY CONNECTION STATUS
function updateFamilySub(){
  var family=JSON.parse(localStorage.getItem(storageKey('dm_family'))||'null');
  var subEl=document.getElementById('family-sub');
  if(family&&family.name){
    subEl.textContent=family.name+(lang==='nl'?' verbonden':' connected');
    subEl.style.color='var(--gd)';
  }else{
    subEl.textContent=lang==='nl'?'Niet verbonden':'Not connected';
    subEl.style.color='';
  }
}

auth.onAuthStateChanged(function(user){
  currentUID=user?user.uid:'';
  if(!user){
    window.location.href='register.html';

    addRecent('scam','Message checked — safe','Bericht gecontroleerd — veilig','g');
  }

<script>
// ══ ALERT RESOLUTION ENGINE ══════════════════════════════
function getAlerts(){
  var items=getRecent();
  var dismissed=JSON.parse(localStorage.getItem(storageKey('dm_dismissed_alerts'))||'[]');
  return items.filter(function(item){
    return (item.severity==='r'||item.severity==='a')&&dismissed.indexOf(item.time)===-1;
  });
}
function dismissAlert(time){
  var dismissed=JSON.parse(localStorage.getItem(storageKey('dm_dismissed_alerts'))||'[]');
  dismissed.push(time);
  localStorage.setItem(storageKey('dm_dismissed_alerts'),JSON.stringify(dismissed));
}
function getWhyDangerous(item){
  var t=(lang==='nl'?item.title_nl:item.title_en).toLowerCase();
  if(lang==='nl'){
    if(t.includes('lek')||t.includes('breach')||t.includes('linkedin'))
      return 'Uw e-mailadres is gevonden in een datalek. Criminelen kunnen uw adres gebruiken om u te misleiden of uw wachtwoord te raden.';
    if(t.includes('oplichting')||t.includes('scam')||t.includes('verdacht'))
      return 'Dit bericht probeert u te misleiden. Het doet alsof het van een bekende organisatie komt, maar is nep. Als u klikt, kunnen criminelen uw gegevens stelen.';
    if(t.includes('inbox'))
      return 'In uw inbox zijn verdachte berichten gevonden die tekenen van oplichting vertonen. Verwijder ze zo snel mogelijk.';
    return 'DigiMaat heeft een veiligheidsrisico gedetecteerd dat uw aandacht vereist.';
  }else{
    if(t.includes('breach')||t.includes('linkedin')||t.includes('leak'))
      return 'Your email address was found in a data breach. Criminals may have your address and could try to trick you or guess your password.';
    if(t.includes('scam')||t.includes('suspicious')||t.includes('likely'))
      return 'This message is trying to trick you. It pretends to be from a trusted organisation but is fake. Clicking any links could allow criminals to steal your information.';
    if(t.includes('inbox'))
      return 'Suspicious messages were found in your inbox showing signs of fraud. It is important to remove them.';
    return 'DigiMaat detected a security risk that needs your attention.';
  }
}
function renderAlertView(){
  var alerts=getAlerts();
  var banner=document.getElementById('smart-banner');
  var alertSection=document.getElementById('alert-list-section');
  var safeSection=document.getElementById('safe-section');
  var wrap=document.getElementById('alerts-btn-wrap');
  if(banner)banner.innerHTML='';
  if(alertSection)alertSection.innerHTML='';
  if(safeSection)safeSection.style.display='block';

  if(alerts.length===0){
    // Green "all clear" alerts button
    if(wrap)wrap.innerHTML=
      '<div onclick="goTo(\'alerts.html\')" style="margin:12px 18px 0;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--gl);border:2px solid var(--gm);-webkit-tap-highlight-color:transparent">'
      +'<div style="width:40px;height:40px;border-radius:10px;background:var(--gm);display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      +'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--gd)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>'
      +'<div style="flex:1">'
      +'<div style="font-size:15px;font-weight:800;color:var(--gd)">'+(lang==='nl'?'Geen meldingen':'No alerts')+'</div>'
      +'<div style="font-size:12px;color:var(--gd);opacity:.7;margin-top:2px">'+(lang==='nl'?'Alles is veilig — tik om te bekijken':'Everything looks safe — tap to view')+'</div>'
      +'</div>'
      +'<span style="font-size:24px;color:var(--gd);font-weight:700;opacity:.5">›</span>'
      +'</div>';
  }else{
    // Amber "N alerts need attention" button
    if(wrap)wrap.innerHTML=
      '<div onclick="goTo(\'alerts.html\')" style="margin:12px 18px 0;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:#FAEEDA;border:2px solid #FAC775;-webkit-tap-highlight-color:transparent">'
      +'<div style="width:40px;height:40px;border-radius:10px;background:#FAC775;display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      +'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#7A4A00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>'
      +'<div style="flex:1">'
      +'<div style="font-size:15px;font-weight:800;color:#7A4A00">'+(lang==='nl'?alerts.length+' melding'+(alerts.length>1?'en':'')+' vereisen aandacht':alerts.length+' alert'+(alerts.length>1?'s':'')+' need attention')+'</div>'
      +'<div style="font-size:12px;color:#AA6800;margin-top:2px">'+(lang==='nl'?'Tik hier om te bekijken en op te lossen':'Tap here to review and fix them')+'</div>'
      +'</div>'
      +'<span style="font-size:24px;color:#BA7517;font-weight:700">›</span>'
      +'</div>';
  }
}
function scrollToAlerts(){var el=document.getElementById('alert-list-anchor');if(el)el.scrollIntoView({behavior:'smooth'});}
var currentAlertIndex=0,pendingAction=null;
function openDetail(index){
  var alerts=getAlerts();if(!alerts.length)return;
  currentAlertIndex=index;renderDetailScreen(alerts);
  document.getElementById('detail-screen').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeDetail(){
  document.getElementById('detail-screen').classList.remove('show');
  document.body.style.overflow='';renderAlertView();
}
function prevAlert(){var a=getAlerts();if(currentAlertIndex>0){currentAlertIndex--;renderDetailScreen(a);}}
function nextAlert(){var a=getAlerts();if(currentAlertIndex<a.length-1){currentAlertIndex++;renderDetailScreen(a);}}
function toggleEmailList(){
  var l=document.getElementById('ds-email-list');
  var lbl=document.getElementById('ds-see-more');
  if(!l||!lbl)return;
  var open=l.style.display==='block';
  l.style.display=open?'none':'block';
  lbl.textContent=open
    ?('▼ '+lbl.dataset.count+' '+(lang==='nl'?'berichten — tik om te bekijken':'messages — tap to see'))
    :('▲ '+(lang==='nl'?'Verbergen':'Hide'));
}

function buildProblemBox(item,title,lang){
  var isInbox=item.title_en&&item.title_en.indexOf('inbox scan')!==-1;
  var lr=null;var msgs=[];
  if(isInbox){try{lr=JSON.parse(localStorage.getItem(storageKey('dm_last_results'))||'null');}catch(e){}msgs=(lr&&lr.suspicious)||[];}
  var emailListHtml='';
  if(isInbox&&msgs.length){
    emailListHtml='<div class="msg-email-list" id="ds-email-list">'
      +msgs.slice(0,5).map(function(m){
        return '<div class="msg-email-row">'
          +'<div class="msg-email-from">'+(m.from||'Unknown sender')+'</div>'
          +'<div class="msg-email-subject">'+(m.subject||(lang==='nl'?'Geen onderwerp':'No subject'))+'</div>'
          +'<div class="msg-email-snip">'+(m.snippet||'')+'</div>'
          +'</div>';
      }).join('')
      +'<a class="msg-goto-inbox" href="inbox.html">'
      +(lang==='nl'?'Bekijk en verwijder in Inbox →':'View & delete in Inbox →')
      +'</a></div>';
  }
  var clickable=isInbox&&emailListHtml;
  return '<div class="msg-box'+(clickable?' expandable':'')+'"'+(clickable?' onclick="toggleEmailList()"':'')+'>'+
    '<div class="msg-label">'+(lang==='nl'?'Wat er gevonden is':'What was found')+'</div>'
    +'<div class="msg-subject">'+title+'</div>'
    +'<div class="msg-body" style="font-size:12px;color:var(--mu);font-family:Nunito,sans-serif">'+timeAgo(item.time)+'</div>'
    +(clickable?'<div class="msg-see-more" id="ds-see-more" data-count="'+msgs.length+'">▼ '+msgs.length+' '+(lang==='nl'?'berichten — tik om te bekijken':'messages — tap to see')+'</div>':'')
    +emailListHtml
    +'</div>';
}

function renderDetailScreen(alerts){
  var item=alerts[currentAlertIndex],total=alerts.length;
  var title=lang==='nl'?item.title_nl:item.title_en;
  var why=getWhyDangerous(item);
  var guardian=getPrimaryGuardian();
  document.getElementById('ds-label').textContent=lang==='nl'?'Melding '+(currentAlertIndex+1):'Alert '+(currentAlertIndex+1);
  document.getElementById('ds-progress').textContent=(currentAlertIndex+1)+' / '+total;
  document.getElementById('ds-prev').disabled=currentAlertIndex===0;
  document.getElementById('ds-next').disabled=currentAlertIndex===total-1;
  var safeTitle=title.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  var html='<div class="why-box">'
    +'<div class="why-title"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--r)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>&nbsp;'+(lang==='nl'?'Waarom is dit gevaarlijk?':'Why is this dangerous?')+'</div>'
    +'<div class="why-text">'+why+'</div></div>'
    +buildProblemBox(item,title,lang)
    +'<div class="action-label">'+(lang==='nl'?'Wat wilt u doen?':'What would you like to do?')+'</div>'
    +'<div class="action-grid">'
    +'<div class="action-card delete" onclick="showDialog(\'delete\','+item.time+')">'
    +'<div class="ac-ico2" style="background:var(--rl)"><svg viewBox="0 0 24 24" style="stroke:var(--r)"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></div>'
    +'<div class="ac-info"><div class="ac-name">'+(lang==='nl'?'Verwijderen':'Delete')+'</div><div class="ac-desc">'+(lang==='nl'?'Verwijder dit bericht definitief':'Permanently remove this message')+'</div></div>'
    +'<svg class="ac-chev" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>'
    +'<div class="action-card spam" onclick="showDialog(\'spam\','+item.time+')">'
    +'<div class="ac-ico2" style="background:var(--al)"><svg viewBox="0 0 24 24" style="stroke:var(--am)"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div>'
    +'<div class="ac-info"><div class="ac-name">'+(lang==='nl'?'Markeren als spam':'Move to spam')+'</div><div class="ac-desc">'+(lang==='nl'?'Blokkeer de afzender en markeer als spam':'Block the sender and mark as spam')+'</div></div>'
    +'<svg class="ac-chev" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>'
    +'<div class="action-card family" onclick="callFamilyHelp(\''+safeTitle+'\')">'
    +'<div class="ac-ico2" style="background:var(--gl)"><svg viewBox="0 0 24 24" style="stroke:var(--gd)"><circle cx="8" cy="7" r="4"/><path d="M2 20c0-4 2.686-6 6-6s6 2 6 6"/><circle cx="18" cy="9" r="3"/></svg></div>'
    +'<div class="ac-info"><div class="ac-name">'+(guardian?(lang==='nl'?'Bel '+guardian.name.split(' ')[0]+' om hulp':'Call '+guardian.name.split(' ')[0]+' for help'):(lang==='nl'?'Vraag familie om hulp':'Ask family for help'))+'</div>'
    +'<div class="ac-desc">'+(guardian?guardian.name.split(' ')[0]+(lang==='nl'?' kan u helpen dit op te lossen':' can help you fix this'):(lang==='nl'?'Voeg eerst een familiecontact toe':'Add a family contact first'))+'</div></div>'
    +'<svg class="ac-chev" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>'
    +'<div class="action-card password" onclick="showPasswordHelp()">'
    +'<div class="ac-ico2" style="background:#E6F1FB"><svg viewBox="0 0 24 24" style="stroke:#185FA5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>'
    +'<div class="ac-info"><div class="ac-name">'+(lang==='nl'?'Wachtwoord wijzigen':'Change my password')+'</div>'
    +'<div class="ac-desc">'+(lang==='nl'?'Stap-voor-stap uitleg hoe u dit doet':'Step-by-step guide to changing your password')+'</div></div>'
    +'<svg class="ac-chev" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>'
    +'</div>';
  document.getElementById('ds-body').innerHTML=html;
  document.getElementById('ds-body').scrollTop=0;
}
function showDialog(action,alertTime){
  pendingAction={action:action,time:alertTime};
  var isDelete=action==='delete';
  document.getElementById('cd-title').textContent=isDelete?(lang==='nl'?'Bericht verwijderen?':'Delete this message?'):(lang==='nl'?'Als spam markeren?':'Mark as spam?');
  document.getElementById('cd-body').textContent=isDelete?(lang==='nl'?'Het bericht wordt definitief verwijderd.':'The message will be permanently deleted.'):(lang==='nl'?'De afzender wordt geblokkeerd en het bericht als spam gemarkeerd.':'The sender will be blocked and the message marked as spam.');
  document.getElementById('cd-confirm').style.background=isDelete?'var(--r)':'var(--am)';
  document.getElementById('cd-confirm').textContent=isDelete?(lang==='nl'?'Ja, verwijderen':'Yes, delete'):(lang==='nl'?'Ja, als spam markeren':'Yes, mark as spam');
  document.getElementById('cd-cancel').textContent=lang==='nl'?'Annuleren':'Cancel';
  document.getElementById('confirm-dialog').classList.add('show');
}
function closeDialog(){document.getElementById('confirm-dialog').classList.remove('show');pendingAction=null;}
function confirmAction(){
  closeDialog();if(!pendingAction)return;
  dismissAlert(pendingAction.time);
  var isDelete=pendingAction.action==='delete';
  document.getElementById('detail-screen').classList.remove('show');
  document.getElementById('confirm-title').textContent=lang==='nl'?'Goed gedaan!':'Well done!';
  document.getElementById('confirm-body').textContent=isDelete?(lang==='nl'?'Het bericht is verwijderd. U bent nu veiliger.':'The message has been deleted. You are safer now.'):(lang==='nl'?'Het bericht is als spam gemarkeerd en de afzender geblokkeerd.':'The message has been marked as spam and the sender blocked.');
  document.getElementById('confirm-done-btn').textContent=lang==='nl'?'Terug naar startpagina':'Back to home';
  document.getElementById('confirm-screen').classList.add('show');
  document.body.style.overflow='hidden';
}
function confirmDone(){
  document.getElementById('confirm-screen').classList.remove('show');
  document.body.style.overflow='';pendingAction=null;
  renderAlertView();
  var remaining=getAlerts();
  if(remaining.length>0)setTimeout(function(){openDetail(0);},300);
}
function callFamilyHelp(alertTitle){
  var g=getPrimaryGuardian();
  if(!g||!g.phone){alert(lang==='nl'?'Voeg eerst een contactpersoon toe via de Familiepagina.':'Please add a guardian with a phone number on the Family page.');return;}
  var name=g.name.split(' ')[0];
  var user=JSON.parse(localStorage.getItem('dm_user')||'{}');
  var senderName=user.name?user.name.split(' ')[0]:'Jan';
  var msg=lang==='nl'
    ?'Hoi '+name+', DigiMaat heeft een veiligheidsmelding gevonden voor '+senderName+': "'+alertTitle+'". Kun je me helpen dit op te lossen? Groet, '+senderName
    :'Hi '+name+', DigiMaat found a security alert for '+senderName+': "'+alertTitle+'". Can you help me deal with this? Thanks, '+senderName;
  var phone=g.phone.replace(/[\s\+\-\(\)]/g,'');
  if(phone.startsWith('0'))phone='31'+phone.substring(1);
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
}
function showPasswordHelp(){
  alert(lang==='nl'
    ?'Stappen om uw wachtwoord te wijzigen:\n\n1. Ga naar de betreffende website of app\n2. Klik op "Inloggen" → "Wachtwoord vergeten"\n3. Voer uw e-mailadres in — u ontvangt een resetlink\n4. Klik de link in uw e-mail en kies een nieuw wachtwoord\n5. Gebruik een wachtwoord dat u nergens anders gebruikt\n\nTip: Minimaal 12 tekens, een hoofdletter, een cijfer en een leesteken.'
    :'Steps to change your password:\n\n1. Go to the website or app where the breach was found\n2. Click "Sign in" → "Forgot password"\n3. Enter your email address — you will receive a reset link\n4. Click the link in your email and choose a new password\n5. Use a password you do not use anywhere else\n\nTip: At least 12 characters, a capital letter, a number and a symbol.');
}
</script>
